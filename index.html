<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Rastreamento PRO</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body{font-family:Arial;margin:0;background:#0f172a;color:#fff}
header{background:#020617;padding:10px;display:flex;justify-content:space-between}
button{padding:8px;border:none;border-radius:6px;cursor:pointer}
.action{background:#22c55e;color:#000}
.delete{background:#ef4444;color:#fff}
.container{padding:15px}
.card{background:#1e293b;padding:10px;margin:10px 0;border-radius:10px}
input,select{width:100%;margin:5px 0;padding:8px;border-radius:6px;border:none}
.menu{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
</style>
</head>

<body>

<div id="login">
  <div class="container">
    <h2>Login</h2>
    <input id="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
    <button onclick="registrar()">Criar Conta</button>
  </div>
</div>

<div id="app" style="display:none">

<header>
  <span id="userEmail"></span>
  <button onclick="logout()">Sair</button>
</header>

<div class="container">

<div class="menu">
<button onclick="mostrar('clientes')">Clientes</button>
<button onclick="mostrar('financeiro')">Financeiro</button>
<button onclick="mostrar('dashboard')">Dashboard</button>
</div>

<!-- CLIENTES -->
<div id="clientes">
<h3>Clientes</h3>
<input id="nome" placeholder="Nome">
<input id="telefone" placeholder="Telefone">
<input id="endereco" placeholder="Endereço">
<input id="mensalidade" placeholder="Mensalidade">
<button class="action" onclick="salvarCliente()">Salvar</button>
<div id="totalClientes"></div>
<div id="listaClientes"></div>
</div>

<!-- FINANCEIRO -->
<div id="financeiro" style="display:none">
<h3>Financeiro</h3>
<input id="valor" placeholder="Valor">
<select id="tipo">
<option>Entrada</option>
<option>Saída</option>
</select>
<input id="descricao" placeholder="Descrição">
<input id="data" type="date">
<select id="status">
<option>Pendente</option>
<option>Pago</option>
</select>
<button class="action" onclick="addFinanceiro()">Salvar</button>
<div id="listaFinanceiro"></div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">
<h3>Resumo</h3>
<div id="saldo"></div>
</div>

</div>
</div>

<script>
const firebaseConfig = {
apiKey: "AIzaSyApCbQJCUQSwP0g6vSBqwrIMSK7n-w9ILc",
authDomain: "global-tecnologia-kanban.firebaseapp.com",
projectId: "global-tecnologia-kanban",
storageBucket: "global-tecnologia-kanban.firebasestorage.app",
messagingSenderId: "526527534352",
appId: "1:526527534352:web:22b874f8029b3cd4c48195"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let userId, editId=null, editFinanceiroId=null;

const email = document.getElementById("email");
const senha = document.getElementById("senha");
const nome = document.getElementById("nome");
const telefone = document.getElementById("telefone");
const endereco = document.getElementById("endereco");
const mensalidade = document.getElementById("mensalidade");
const listaClientes = document.getElementById("listaClientes");
const totalClientes = document.getElementById("totalClientes");
const valor = document.getElementById("valor");
const tipo = document.getElementById("tipo");
const descricao = document.getElementById("descricao");
const data = document.getElementById("data");
const status = document.getElementById("status");
const listaFinanceiro = document.getElementById("listaFinanceiro");
const saldo = document.getElementById("saldo");
const loginDiv = document.getElementById("login");
const app = document.getElementById("app");
const userEmail = document.getElementById("userEmail");

function login(){auth.signInWithEmailAndPassword(email.value,senha.value)}
function registrar(){auth.createUserWithEmailAndPassword(email.value,senha.value)}
function logout(){auth.signOut()}

auth.onAuthStateChanged(user=>{
if(user){
userId=user.uid;
userEmail.innerText=user.email;
loginDiv.style.display="none";
app.style.display="block";
carregarTudo();
}else{
loginDiv.style.display="block";
app.style.display="none";
}
});

function salvarCliente(){
if(!userId)return;
let dataObj={userId,nome:nome.value,telefone:telefone.value,endereco:endereco.value,mensalidade:Number(mensalidade.value)||0};
if(editId){db.collection("clientes").doc(editId).update(dataObj);editId=null;}else{db.collection("clientes").add(dataObj);} 
}

function carregarClientes(){
db.collection("clientes").where("userId","==",userId).onSnapshot(snap=>{
listaClientes.innerHTML="";
totalClientes.innerHTML="👥 "+snap.size;
snap.forEach(doc=>{
let c=doc.data();
let tel=c.telefone.replace(/\D/g,"");
listaClientes.innerHTML+=`<div class="card"><b>${c.nome}</b><br>${c.telefone}<br>R$ ${c.mensalidade}<br>
<a target="_blank" href="https://wa.me/55${tel}?text=Cobrança"><button>WhatsApp</button></a>
<button onclick="del('clientes','${doc.id}')">Excluir</button></div>`;
});
});
}

function addFinanceiro(){
let dataObj={userId,valor:Number(valor.value)||0,tipo:tipo.value,descricao:descricao.value,data:data.value,status:status.value};
if(editFinanceiroId){db.collection("financeiro").doc(editFinanceiroId).update(dataObj);editFinanceiroId=null;}else{db.collection("financeiro").add(dataObj);} }

function carregarFinanceiro(){
db.collection("financeiro").where("userId","==",userId).onSnapshot(snap=>{
listaFinanceiro.innerHTML="";
let entrada=0,saida=0;
snap.forEach(doc=>{
let f=doc.data();
listaFinanceiro.innerHTML+=`<div class="card">${f.tipo} R$ ${f.valor}<br>${f.descricao}<br>${f.status}</div>`;
if(f.tipo==="Entrada"&&f.status==="Pago")entrada+=f.valor;
if(f.tipo==="Saída"&&f.status==="Pago")saida+=f.valor;
});
let saldoFinal=entrada-saida;
saldo.innerHTML=`💰 ${saldoFinal.toFixed(2)}<br>📈 ${entrada}<br>📉 ${saida}`;
});
}

function carregarTudo(){carregarClientes();carregarFinanceiro();}

function del(col,id){db.collection(col).doc(id).delete();}

function mostrar(sec){document.querySelectorAll('.container > div').forEach(d=>d.style.display='none');document.getElementById(sec).style.display='block'}
</script>

</body>
</html>
