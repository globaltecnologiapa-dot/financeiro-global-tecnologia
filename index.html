<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financeiro Empresarial PRO</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#fff}
.container{display:flex}
.sidebar{width:230px;background:#111827;padding:20px}
.sidebar button{width:100%;margin:5px 0;padding:10px;border:none;background:#1f2937;color:#fff;border-radius:6px;cursor:pointer}
.main{flex:1;padding:20px}

.card{
background:#1e293b;
padding:15px;
margin:10px 0;
border-radius:12px;
transition:0.3s;
}
.card:hover{transform:translateY(-3px)}

input,select{
width:100%;
padding:10px;
margin:5px 0;
background:#020617;
color:#fff;
border:none;
border-radius:6px
}

.btn{padding:8px;border:none;border-radius:6px;margin-top:5px;cursor:pointer}
.btn-editar{background:#3b82f6;color:#fff}
.btn-excluir{background:#ef4444;color:#fff}

.toast{
position:fixed;
bottom:20px;
right:20px;
background:#22c55e;
padding:10px;
border-radius:6px;
opacity:0;
transition:0.3s;
}
.toast.show{opacity:1}
</style>
</head>

<body>

<div id="loginDiv">
<h2>Login</h2>
<input id="email">
<input id="senha" type="password">
<button onclick="login()">Entrar</button>
</div>

<div id="app" style="display:none;">
<div class="container">

<div class="sidebar">
<button onclick="mostrar('dashboard')">Dashboard</button>
<button onclick="mostrar('financeiro')">Financeiro</button>
<button onclick="mostrar('contas')">Contas</button>
<button onclick="mostrar('estoque')">Estoque</button>
<button onclick="mostrar('usuarios')">Usuários</button>
<button onclick="logout()">Sair</button>
</div>

<div class="main">

<div id="dashboard">
<h2>Dashboard</h2>
<div id="saldo"></div>
<canvas id="grafico"></canvas>
</div>

<div id="financeiro" style="display:none">
<h2>Lançamentos</h2>

<input id="valor" placeholder="Valor">
<select id="tipo">
<option>Entrada</option>
<option>Saída</option>
</select>

<select id="origem">
<option value="salario">Salário</option>
<option value="reinvestimento">Reinvestimento</option>
<option value="outros">Outros</option>
</select>

<input id="descricao" placeholder="Descrição">
<select id="status">
<option>Pago</option>
<option>Pendente</option>
</select>

<button onclick="salvarFinanceiro()">Salvar</button>

<select id="filtroTipo" onchange="renderFinanceiro()">
<option value="todos">Todos</option>
<option value="Entrada">Entrada</option>
<option value="Saída">Saída</option>
</select>

<input id="busca" placeholder="Buscar" onkeyup="renderFinanceiro()">

<div id="listaFinanceiro"></div>
</div>

<div id="contas" style="display:none">
<h2>Contas</h2>
<input id="nomeConta">
<input id="valorConta">
<select id="tipoConta">
<option value="pagar">Pagar</option>
<option value="receber">Receber</option>
</select>
<input type="date" id="dataConta">
<button onclick="salvarConta()">Salvar</button>
<div id="listaContas"></div>
</div>

<div id="estoque" style="display:none">
<h2>Estoque</h2>
<input id="produto">
<input id="quantidade">
<button onclick="salvarProduto()">Salvar</button>
<div id="listaEstoque"></div>
</div>

<div id="usuarios" style="display:none">
<h2>Usuários</h2>
<input id="novoEmail">
<button onclick="addUser()">Adicionar</button>
<div id="listaUsuarios"></div>
</div>

</div>
</div>
</div>

<div id="toast" class="toast"></div>

<script>

// FIREBASE
const firebaseConfig={
apiKey:"AIzaSyApCbQJCUQSwP0g6vSBqwrIMSK7n-w9ILc",
authDomain:"global-tecnologia-kanban.firebaseapp.com",
projectId:"global-tecnologia-kanban"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.firestore();

let userId,empresaId;

// LOGIN
function login(){auth.signInWithEmailAndPassword(email.value,senha.value)}
function logout(){auth.signOut()}

auth.onAuthStateChanged(async user=>{
if(user){

userId=user.uid;

let doc=await db.collection("usuarios").doc(userId).get();

if(!doc.exists){
let empresa=await db.collection("empresas").add({nome:"Empresa",dono:userId});

await db.collection("usuarios").doc(userId).set({
empresaId:empresa.id,
tipo:"admin"
});
}

let dados=(await db.collection("usuarios").doc(userId).get()).data();
empresaId=dados.empresaId;

loginDiv.style.display="none";
app.style.display="block";

init();

}else{
loginDiv.style.display="block";
app.style.display="none";
}
});

// TOAST
function toast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),2000);
}

// FINANCEIRO
function salvarFinanceiro(){

let v=parseFloat(valor.value);

let sal=0,inv=0;

if(tipo.value==="Entrada"){
sal=v*0.6;
inv=v*0.4;
}

db.collection("empresas").doc(empresaId).collection("financeiro").add({
valor:v,
tipo:tipo.value,
origem:origem.value,
descricao:descricao.value,
status:status.value,
salario:sal,
investimento:inv,
data:new Date().toISOString()
}).then(()=>{toast("Salvo")});
}

function renderFinanceiro(){

db.collection("empresas").doc(empresaId).collection("financeiro")
.onSnapshot(snap=>{

listaFinanceiro.innerHTML="";

snap.forEach(doc=>{
let f=doc.data();

let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<strong>${f.tipo}</strong> - R$ ${f.valor}<br>
${f.descricao || "-"}
`;

let e=document.createElement("button");
e.innerText="✏️";
e.className="btn btn-editar";
e.onclick=()=>editar(doc.id,f);

let x=document.createElement("button");
x.innerText="🗑️";
x.className="btn btn-excluir";
x.onclick=()=>excluir(doc.id);

card.appendChild(e);
card.appendChild(x);

listaFinanceiro.appendChild(card);
});
});
}

function excluir(id){
db.collection("empresas").doc(empresaId).collection("financeiro").doc(id).delete();
toast("Excluído");
}

// CONTAS
function salvarConta(){
db.collection("empresas").doc(empresaId).collection("contas").add({
nome:nomeConta.value,
valor:valorConta.value
});
}

// ESTOQUE
function salvarProduto(){
db.collection("empresas").doc(empresaId).collection("estoque").add({
nome:produto.value,
quantidade:quantidade.value
});
}

// USUÁRIOS
function addUser(){
db.collection("usuarios").add({
email:novoEmail.value,
empresaId:empresaId
});
}

// INIT
function init(){
renderFinanceiro();
}

// NAV
function mostrar(id){
document.querySelectorAll(".main>div").forEach(d=>d.style.display="none");
document.getElementById(id).style.display="block";
}

</script>

</body>
</html>
