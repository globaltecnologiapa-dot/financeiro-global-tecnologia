<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Global Tecnologia Financeiro</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 15px;
  margin: 10px;
  border-radius: 10px;
}

input, select, button {
  padding: 8px;
  margin: 5px;
  border-radius: 5px;
  border: none;
}

button {
  background: orange;
  color: black;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>Global Tecnologia</h1>

<div class="card">
  <input id="valor" type="number" placeholder="Valor">
  <input id="descricao" placeholder="Descrição">

  <select id="tipo">
    <option value="entrada">Entrada</option>
    <option value="saida">Saída</option>
  </select>

  <button onclick="adicionar()">Adicionar</button>
</div>

<div class="card">
  <h3>Dashboard</h3>
  <p>Entradas: <span id="entradas"></span></p>
  <p>Saídas: <span id="saidas"></span></p>
  <p>Lucro: <span id="lucro"></span></p>
  <p>Salário (30%): <span id="salario"></span></p>
  <p>Investir: <span id="investir"></span></p>
</div>

<div class="card">
  <h3>Capital de Giro</h3>
  <input id="capital" type="number" onchange="salvarCapital()">
</div>

<div class="card">
  <h3>Histórico</h3>
  <div id="lista"></div>
</div>

<script>
let dados = JSON.parse(localStorage.getItem("dados")) || [];
let capital = localStorage.getItem("capital") || 0;

document.getElementById("capital").value = capital;

function salvar() {
  localStorage.setItem("dados", JSON.stringify(dados));
}

function salvarCapital() {
  capital = parseFloat(document.getElementById("capital").value) || 0;
  localStorage.setItem("capital", capital);
  atualizar();
}

function adicionar() {
  let valor = parseFloat(document.getElementById("valor").value);
  let descricao = document.getElementById("descricao").value;
  let tipo = document.getElementById("tipo").value;

  if (!valor) return;

  dados.push({ valor, descricao, tipo });
  salvar();
  atualizar();
}

function excluir(index) {
  dados.splice(index, 1);
  salvar();
  atualizar();
}

function atualizar() {
  let entradas = dados.filter(d => d.tipo === "entrada")
                      .reduce((a,b)=>a+b.valor,0);

  let saidas = dados.filter(d => d.tipo === "saida")
                    .reduce((a,b)=>a+b.valor,0);

  let lucro = entradas - saidas;
  let salario = lucro * 0.3;
  let investir = lucro - salario - capital;

  document.getElementById("entradas").innerText = entradas;
  document.getElementById("saidas").innerText = saidas;
  document.getElementById("lucro").innerText = lucro;
  document.getElementById("salario").innerText = salario;
  document.getElementById("investir").innerText = investir;

  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  dados.forEach((d, i) => {
    lista.innerHTML += `
      <div>
        ${d.descricao} - R$ ${d.valor}
        <button onclick="excluir(${i})">Excluir</button>
      </div>
    `;
  });
}

atualizar();
</script>

</body>
</html>
