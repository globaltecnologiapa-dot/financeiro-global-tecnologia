<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyApCbQJCUQSwP0g6vSBqwrIMSK7n-w9ILc",
  authDomain: "global-tecnologia-kanban.firebaseapp.com",
  projectId: "global-tecnologia-kanban",
  storageBucket: "global-tecnologia-kanban.firebasestorage.app",
  messagingSenderId: "526527534352",
  appId: "1:526527534352:web:22b874f8029b3cd4c48195",
  measurementId: "G-MX3QFXSL04"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let userId = null;
let dados = [];
let capital = 0;
let links = [];

// ELEMENTOS
const loginDiv = document.getElementById("login");
const appDiv = document.getElementById("app");

const emailInput = document.getElementById("email");
const senhaInput = document.getElementById("senha");

const lista = document.getElementById("lista");
const relogio = document.getElementById("relogio");
const linksDiv = document.getElementById("links");

// LOGIN
window.login = async () => {
  try {
    await signInWithEmailAndPassword(auth, emailInput.value, senhaInput.value);
  } catch (e) {
    alert("Erro login: " + e.message);
  }
};

window.logout = () => signOut(auth);

// AUTH
onAuthStateChanged(auth, async (user) => {
  if (user) {
    userId = user.uid;
    loginDiv.style.display = "none";
    appDiv.style.display = "block";
    carregar();
  }
});

// CARREGAR DADOS
async function carregar() {
  dados = [];
  const snap = await getDocs(collection(db, userId));
  snap.forEach(d => dados.push({ id: d.id, ...d.data() }));
  atualizar();
}

// SALVAR
window.salvar = async () => {
  await addDoc(collection(db, userId), {
    valor: parseFloat(document.getElementById("valor").value),
    descricao: document.getElementById("descricao").value,
    tipo: document.getElementById("tipo").value,
    data: document.getElementById("data").value
  });
  carregar();
};

// EXCLUIR
window.excluir = async (id) => {
  await deleteDoc(doc(db, userId, id));
  carregar();
};

// CAPITAL
window.salvarCapital = () => {
  capital = parseFloat(document.getElementById("capital").value) || 0;
  atualizar();
};

// ATUALIZAR DASHBOARD
function atualizar() {
  let entradas = dados.filter(d => d.tipo === "entrada").reduce((a,b)=>a+b.valor,0);
  let saidas = dados.filter(d => d.tipo === "saida").reduce((a,b)=>a+b.valor,0);
  let lucro = entradas - saidas;
  let salario = lucro * 0.3;
  let investir = lucro - salario - capital;

  document.getElementById("entradas").innerText = entradas;
  document.getElementById("saidas").innerText = saidas;
  document.getElementById("lucro").innerText = lucro;
  document.getElementById("salario").innerText = salario;
  document.getElementById("investir").innerText = investir;
  document.getElementById("capitalView").innerText = capital;

  lista.innerHTML = "";
  dados.forEach(d => {
    lista.innerHTML += `
      <div>
        ${d.descricao} - R$ ${d.valor}
        <button onclick="excluir('${d.id}')">Excluir</button>
      </div>
    `;
  });
}

// LINKS
window.addLink = () => {
  links.push({
    nome: document.getElementById("nomeLink").value,
    url: document.getElementById("urlLink").value
  });
  renderLinks();
};

function renderLinks() {
  linksDiv.innerHTML = "";
  links.forEach((l,i) => {
    linksDiv.innerHTML += `
      <div>
        <a href="${l.url}" target="_blank">${l.nome}</a>
        <button onclick="links.splice(${i},1);renderLinks()">Excluir</button>
      </div>
    `;
  });
}

// RELÓGIO
setInterval(() => {
  relogio.innerText = new Date().toLocaleString();
}, 1000);

// DARK MODE
window.toggleMode = () => {
  document.body.classList.toggle("light");
};
</script>
