<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financeiro Bank PRO</title>

<!-- FAVICON -->
<link rel="icon" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
<circle cx='50' cy='50' r='40' fill='%23ef4444'/>
<circle cx='50' cy='50' r='15' fill='white'/>
</svg>">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#fff}
.container{display:flex}
.sidebar{width:230px;background:#111827;padding:20px}
.sidebar button{width:100%;margin:5px 0;padding:10px;border:none;background:#1f2937;color:#fff;border-radius:6px}
.main{flex:1;padding:20px}
.card{background:#1e293b;padding:15px;margin:10px 0;border-radius:12px}
input,select{width:100%;padding:8px;margin:5px 0;background:#020617;color:#fff;border:none;border-radius:6px}
#loginDiv{display:flex;justify-content:center;align-items:center;height:100vh;flex-direction:column}
.light{background:#f1f5f9;color:#000}
.light .card{background:#fff;color:#000}
.light .sidebar{background:#e2e8f0}
</style>
</head>

<body>

<div id="loginDiv">
<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="senha" type="password">
<button onclick="login()">Entrar</button>
</div>

<div id="app" style="display:none;">
<div class="container">

<div class="sidebar">
<button onclick="mostrar('dashboard')">Dashboard</button>
<button onclick="mostrar('financeiro')">Financeiro</button>
<button onclick="mostrar('links')">Links</button>
<button onclick="toggleTema()">Tema</button>
<button onclick="logout()">Sair</button>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard">
<h2>Dashboard</h2>
<div id="dataHora"></div>

<select id="mesSelecionado" onchange="carregarDashboard()"></select>

<div id="saldo"></div>

<canvas id="grafico"></canvas>

<h3>Links rápidos</h3>
<div id="linksDashboard"></div>
</div>

<!-- FINANCEIRO -->
<div id="financeiro" style="display:none">
<h2>Lançamentos</h2>

<input id="valor" placeholder="Valor">
<select id="tipo">
<option>Entrada</option>
<option>Saída</option>
</select>

<select id="origem">
<option value="salario">Salário</option>
<option value="reinvestimento">Reinvestimento</option>
<option value="imposto">Imposto</option>
<option value="servidor">Servidor</option>
<option value="manutencao">Manutenção</option>
<option value="chip">Compra de Chip</option>
<option value="rastreador">Compra de Rastreador</option>
<option value="internet">Internet</option>
<option value="energia">Energia</option>
<option value="telefone">Telefone</option>
<option value="agua">Água</option>
<option value="escritorio">Material Escritório</option>
<option value="contador">Contador</option>
<option value="outros">Outros</option>
</select>
<!-- LINKS -->
<div id="links" style="display:none">
<h2>Links</h2>
<input id="nomeLink" placeholder="Nome">
<input id="urlLink" placeholder="URL">
<button onclick="salvarLink()">Salvar</button>
<div id="listaLinks"></div>
</div>

</div>
</div>
</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyApCbQJCUQSwP0g6vSBqwrIMSK7n-w9ILc",
authDomain:"global-tecnologia-kanban.firebaseapp.com",
projectId:"global-tecnologia-kanban"
};
firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.firestore();
let userId;

// LOGIN
function login(){auth.signInWithEmailAndPassword(email.value,senha.value)}
function logout(){auth.signOut()}

auth.onAuthStateChanged(user=>{
if(user){
userId=user.uid;
loginDiv.style.display="none";
app.style.display="block";
init();
}else{
loginDiv.style.display="block";
app.style.display="none";
}
});

// SALVAR FINANCEIRO
function salvarFinanceiro(){

const valorInput = document.getElementById("valor");
const tipoInput = document.getElementById("tipo");
const origemInput = document.getElementById("origem");
const descricaoInput = document.getElementById("descricao");
const statusInput = document.getElementById("status");

let valorFinal = parseFloat(valorInput.value.replace(",", "."));

if(isNaN(valorFinal) || valorFinal <= 0){
alert("Digite um valor válido");
return;
}

db.collection("financeiro").add({
userId,
valor: valorFinal,
tipo: tipoInput.value,
origem: tipoInput.value==="Entrada" ? "geral" : origemInput.value,
descricao: descricaoInput.value || "",
status: statusInput.value,
data: new Date().toISOString()
})
.then(()=>{
valorInput.value="";
descricaoInput.value="";
carregarDashboard();
})
.catch(e=>{
alert("Erro ao salvar: "+e.message);
console.error(e);
});
}

// DASHBOARD
function carregarDashboard(){

let entrada=0,saida=0,saidaSal=0,saidaInv=0;

let mes=Number(mesSelecionado.value);
let ano=new Date().getFullYear();

db.collection("financeiro").where("userId","==",userId).get()
.then(snap=>{

snap.forEach(doc=>{
let f=doc.data();
if(!f.data) return;

let d=new Date(f.data);

if(d.getMonth()==mes && d.getFullYear()==ano){

if(f.status==="Pago"){

if(f.tipo==="Entrada") entrada+=f.valor;

if(f.tipo==="Saída"){
saida+=f.valor;

if(f.origem==="salario") saidaSal+=f.valor;
if(f.origem==="reinvestimento") saidaInv+=f.valor;
}

}

}

});

let salario=(entrada*0.6)-saidaSal;
let investimento=(entrada*0.4)-saidaInv;
let saldoTotal=entrada-saida;

saldo.innerHTML=`
💰 Entrada: ${entrada.toFixed(2)}<br>
💸 Saída: ${saida.toFixed(2)}<br>
📊 Saldo Total: ${saldoTotal.toFixed(2)}<br><br>

💼 Salário disponível: ${salario.toFixed(2)}<br>
🔁 Investimento disponível: ${investimento.toFixed(2)}
`;

grafico(entrada,saida,salario,investimento);

});
}

// GRÁFICO
function grafico(e,s,sa,i){
const ctx=document.getElementById("grafico");

if(window.grafico) window.grafico.destroy();

window.grafico=new Chart(ctx,{
type:'doughnut',
data:{
labels:['Entrada','Saída','Salário','Investimento'],
datasets:[{data:[e,s,sa,i]}]
}
});
}

// RENDER FINANCEIRO
function renderFinanceiro(){
db.collection("financeiro").where("userId","==",userId)
.onSnapshot(snap=>{
listaFinanceiro.innerHTML="";
snap.forEach(doc=>{
let f=doc.data();
listaFinanceiro.innerHTML+=`
<div class="card">
${f.tipo} - ${f.valor} (${f.origem})<br>
${f.descricao||""}
</div>`;
});
});
}

// LINKS
function salvarLink(){
db.collection("links").add({
userId,
nome:nomeLink.value,
url:urlLink.value
}).then(renderLinks);
}

function renderLinks(){
db.collection("links").where("userId","==",userId)
.onSnapshot(snap=>{
listaLinks.innerHTML="";
linksDashboard.innerHTML="";

snap.forEach(doc=>{
let d=doc.data();
let url=d.url.startsWith("http")?d.url:"https://"+d.url;

listaLinks.innerHTML+=`
<div class="card">
${d.nome}
<button onclick="window.open('${url}')">Abrir</button>
</div>`;

linksDashboard.innerHTML+=`
<button onclick="window.open('${url}')">${d.nome}</button>`;
});
});
}

// DATA
setInterval(()=>dataHora.innerHTML=new Date().toLocaleString("pt-BR"),1000);

// TEMA
function toggleTema(){
document.body.classList.toggle("light");
localStorage.setItem("tema",document.body.classList.contains("light"));
}

window.onload=()=>{
if(localStorage.getItem("tema")=="true"){
document.body.classList.add("light");
}
}

// INIT
function init(){

mesSelecionado.innerHTML="";
for(let i=0;i<12;i++){
mesSelecionado.innerHTML+=`<option value="${i}">${i+1}</option>`;
}

mesSelecionado.value=new Date().getMonth();

carregarDashboard();
renderFinanceiro();
renderLinks();
}

// NAV
function mostrar(id){
document.querySelectorAll('.main>div').forEach(d=>d.style.display='none');
document.getElementById(id).style.display='block';
}
</script>

</body>
</html>
