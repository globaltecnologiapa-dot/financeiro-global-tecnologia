<script>
// ================= FIREBASE =================
const firebaseConfig = {

};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let userId;

// ================= AUTH =================
function login(){ auth.signInWithEmailAndPassword(email.value, senha.value); }
function registrar(){ auth.createUserWithEmailAndPassword(email.value, senha.value); }
function logout(){ auth.signOut(); }

auth.onAuthStateChanged(user=>{
if(user){
userId=user.uid;
userEmail.innerText=user.email;
loginDiv.style.display="none";
app.style.display="block";
carregarTudo();
}else{
loginDiv.style.display="block";
app.style.display="none";
}
});

// ================= CLIENTES =================
let editId = null;

function salvarCliente(){
  let data = {
    userId,
    nome: nome.value,
    telefone: telefone.value,
    endereco: endereco.value,
    mensalidade: Number(mensalidade.value) || 0,
    vencimento: 10
  };

  if(editId){
    db.collection("clientes").doc(editId).update(data);
    editId=null;
  } else {
    db.collection("clientes").add(data);
  }

  limparCampos();
}

function limparCampos(){
  nome.value="";
  telefone.value="";
  endereco.value="";
  mensalidade.value="";
}

function carregarClientes(){
  db.collection("clientes").where("userId","==",userId)
  .onSnapshot(snap=>{
    listaClientes.innerHTML="";
    totalClientes.innerHTML = "👥 "+snap.size+" Clientes";

    snap.forEach(doc=>{
      let c = doc.data();

      let msg = `Olá ${c.nome}, sua mensalidade de R$ ${c.mensalidade} está disponível para pagamento.`;

      listaClientes.innerHTML += `
      <div class="card">
      <b>${c.nome}</b><br>
      📞 ${c.telefone}<br>
      💰 R$ ${c.mensalidade}<br><br>

      <a target="_blank" href="https://wa.me/55${c.telefone}?text=${encodeURIComponent(msg)}">
      <button class="action">Cobrar no WhatsApp</button>
      </a>

      <button class="delete" onclick="del('clientes','${doc.id}')">Excluir</button>
      </div>`;
    });
  });
}

// ================= COBRANÇA AUTOMÁTICA =================
function gerarCobrancas(){

  let hoje = new Date();
  let dia = hoje.getDate();
  let mes = hoje.getMonth();
  let ano = hoje.getFullYear();

  db.collection("clientes").where("userId","==",userId)
  .get()
  .then(snap=>{

    snap.forEach(doc=>{
      let c = doc.data();

      if(dia === c.vencimento){

        let dataHoje = hoje.toISOString().split("T")[0];

        db.collection("financeiro")
        .where("descricao","==",c.nome)
        .where("data","==",dataHoje)
        .get()
        .then(existe=>{

          if(existe.empty){

            db.collection("financeiro").add({
              userId,
              valor: c.mensalidade,
              tipo: "Entrada",
              descricao: c.nome,
              data: dataHoje,
              status: "Pendente",
              categoria: "Mensalidade",
              fixo: "Fixo"
            });

          }

        });

      }

    });

  });

}

// ================= FINANCEIRO =================
let editFinanceiroId = null;

function addFinanceiro(){

  let dataObj = {
    userId,
    valor: Number(valor.value),
    tipo: tipo.value,
    descricao: descricao.value,
    data: data.value,
    status: status.value,
    categoria: categoria.value,
    fixo: fixo.value
  };

  if(editFinanceiroId){
    db.collection("financeiro").doc(editFinanceiroId).update(dataObj);
    editFinanceiroId = null;
  } else {
    db.collection("financeiro").add(dataObj);
  }

  limparFinanceiro();
}

function limparFinanceiro(){
  valor.value="";
  descricao.value="";
  data.value="";
}

function marcarPago(id){
  db.collection("financeiro").doc(id).update({ status:"Pago" });
}

// DESPESAS FIXAS
function gerarDespesasFixas(){

  let hoje = new Date().toISOString().split("T")[0];

  db.collection("financeiro")
  .where("userId","==",userId)
  .where("fixo","==","Fixo")
  .get()
  .then(snap=>{

    snap.forEach(doc=>{
      let f = doc.data();

      db.collection("financeiro")
      .where("descricao","==",f.descricao)
      .where("data","==",hoje)
      .get()
      .then(existe=>{

        if(existe.empty){

          db.collection("financeiro").add({
            ...f,
            data: hoje,
            status: "Pendente"
          });

        }

      });

    });

  });

}

// DASHBOARD FINANCEIRO
function carregarFinanceiro(){
  db.collection("financeiro").where("userId","==",userId)
  .onSnapshot(snap=>{

    listaFinanceiro.innerHTML="";
    let entrada=0, saida=0;

    let mesAtual = new Date().getMonth();
    let anoAtual = new Date().getFullYear();

    snap.forEach(doc=>{
      let f = doc.data();
      let dataObj = new Date(f.data);

      if(dataObj.getMonth()===mesAtual && dataObj.getFullYear()===anoAtual){

        listaFinanceiro.innerHTML += `
        <div class="card">
        ${f.tipo} - R$ ${f.valor}<br>
        ${f.descricao}<br>
        ${f.data}<br>
        ${f.status}<br>
        <button onclick="marcarPago('${doc.id}')">Pago</button>
        <button class="delete" onclick="del('financeiro','${doc.id}')">Excluir</button>
        </div>`;

        if(f.tipo==="Entrada" && f.status==="Pago") entrada+=f.valor;
        if(f.tipo==="Saída" && f.status==="Pago") saida+=f.valor;

      }

    });

    let saldoFinal = entrada - saida;

    saldo.innerHTML = `
    💰 Lucro: R$ ${saldoFinal.toFixed(2)}<br>
    📈 Entrada: R$ ${entrada.toFixed(2)}<br>
    📉 Saída: R$ ${saida.toFixed(2)}<br><br>
    🔁 Reinvestir: R$ ${(saldoFinal*0.4).toFixed(2)}<br>
    💵 Retirar: R$ ${(saldoFinal*0.6).toFixed(2)}
    `;

  });
}

// ================= DELETE =================
function del(col,id){
  db.collection(col).doc(id).delete();
}

// ================= LOAD =================
function carregarTudo(){
  carregarClientes();
  carregarFinanceiro();
  gerarDespesasFixas();
  gerarCobrancas(); // 🔥 cobrança automática
}

// ================= NAV =================
function mostrar(sec){
document.querySelectorAll('.main > div').forEach(d=>d.style.display='none');
document.getElementById(sec).style.display='block';
}
</script>
