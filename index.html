<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Rastreamento PRO UX</title>

<!-- FAVICON (EMBUTIDO - SEM ERRO) -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
<rect width='100' height='100' rx='20' fill='%230f172a'/>
<text x='50%' y='55%' font-size='50' text-anchor='middle' fill='%23facc15' dy='.3em'>G</text>
</svg>">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#fff}
.container{display:flex;min-height:100vh}
.sidebar{width:260px;background:#111827;padding:20px}
.sidebar h3{text-align:center}
.sidebar button{width:100%;margin:6px 0;padding:12px;background:#1f2937;border:none;color:#fff;border-radius:8px;cursor:pointer}
.sidebar button:hover{background:#22c55e;color:#000}
.main{flex:1;padding:20px}
.card{background:#1e293b;padding:15px;border-radius:12px;margin-bottom:10px}
input,select{width:100%;padding:10px;margin:5px 0;border:none;border-radius:6px;background:#0f172a;color:#fff}
button{padding:10px;border:none;border-radius:6px;margin-top:5px;cursor:pointer}
.delete{background:#ef4444}
.edit{background:#22c55e;color:#000}
.abrir{background:#3b82f6;color:#fff}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginDiv">
<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
<button onclick="registrar()">Criar Conta</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">
<div class="container">

<div class="sidebar">
<h3>Global Rastreamento</h3>
<button onclick="mostrar('dashboard')">Dashboard</button>
<button onclick="mostrar('clientes')">Clientes</button>
<button onclick="mostrar('rastreadores')">Rastreadores</button>
<button onclick="mostrar('financeiro')">Financeiro</button>
<button onclick="mostrar('estoque')">Estoque</button>
<button onclick="mostrar('links')">Links</button>
<button onclick="mostrar('relatorios')">Relatórios</button>
<button onclick="logout()">Sair</button>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard">
<h2>Dashboard</h2>
<div class="grid">
<div class="card" id="totalClientes"></div>
<div class="card" id="totalRastreadores"></div>
<div class="card" id="saldo"></div>
</div>
<canvas id="grafico"></canvas>
</div>

<!-- CLIENTES -->
<div id="clientes" style="display:none">
<h2>Clientes</h2>
<input id="nome" placeholder="Nome">
<input id="telefone" placeholder="Telefone">
<input id="endereco" placeholder="Endereço">
<input id="mensalidade" placeholder="Mensalidade">
<input id="placas" placeholder="Placas">
<button onclick="salvarCliente()">Salvar</button>
<div id="listaClientes"></div>
</div>

<!-- LINKS -->
<div id="links" style="display:none">
<h2>Links</h2>
<input id="nomeLink" placeholder="Nome">
<input id="urlLink" placeholder="URL">
<button onclick="salvarLink()">Salvar</button>
<div id="listaLinks"></div>
</div>

</div>
</div>
</div>

<script>
const firebaseConfig={
apiKey:"SUA_API",
authDomain:"global-tecnologia-kanban.firebaseapp.com",
projectId:"global-tecnologia-kanban"
};
firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.firestore();
let userId;

// LOGIN
function login(){
auth.signInWithEmailAndPassword(email.value,senha.value)
.catch(e=>alert(e.message));
}

function registrar(){
auth.createUserWithEmailAndPassword(email.value,senha.value)
.catch(e=>alert(e.message));
}

function logout(){auth.signOut();}

// AUTH
auth.onAuthStateChanged(user=>{
if(user){
userId=user.uid;
loginDiv.style.display="none";
app.style.display="block";
carregarTudo();
}else{
loginDiv.style.display="block";
app.style.display="none";
}
});

// SALVAR
function salvar(col,data){
db.collection(col).add(data).then(carregarTudo);
}

// CLIENTE
function salvarCliente(){
salvar("clientes",{userId,nome:nome.value,telefone:telefone.value,endereco:endereco.value,mensalidade:Number(mensalidade.value)||0,placas:placas.value});
}

// LINK
function salvarLink(){
salvar("links",{userId,nome:nomeLink.value,url:urlLink.value});
}

// RENDER (SEM UID)
function render(col,lista){
db.collection(col).where("userId","==",userId).onSnapshot(snap=>{
lista.innerHTML="";
snap.forEach(doc=>{
let d=doc.data();

let valores = Object.entries(d)
.filter(([k])=>k!=="userId")
.map(([k,v])=>v)
.join(" | ");

let botoes="";

if(col==="links"){
botoes+=`<button class='abrir' onclick="window.open('${d.url}','_blank')">Abrir</button>`;
}

lista.innerHTML+=`
<div class='card'>
${valores}<br>
${botoes}
<button class='delete' onclick="del('${col}','${doc.id}')">Excluir</button>
</div>`;
});
});
}

// DELETE
function del(col,id){
db.collection(col).doc(id).delete();
}

// DASHBOARD
function carregarDashboard(){
let entrada=0,saida=0;

db.collection("clientes").where("userId","==",userId).get()
.then(s=>totalClientes.innerHTML="Clientes: "+s.size);

db.collection("rastreadores").where("userId","==",userId).get()
.then(s=>totalRastreadores.innerHTML="Rastreadores: "+s.size);

db.collection("financeiro").where("userId","==",userId).get()
.then(snap=>{
snap.forEach(doc=>{
let f=doc.data();
if(f.tipo==="Entrada")entrada+=f.valor;
if(f.tipo==="Saída")saida+=f.valor;
});

let saldoFinal=entrada-saida;

saldo.innerHTML=`
💰 Saldo: ${saldoFinal.toFixed(2)}<br>
Entrada: ${entrada}<br>
Saída: ${saida}
`;

graficoDashboard(saldoFinal,entrada,saida);
});
}

// GRÁFICO CORRIGIDO
function graficoDashboard(saldoFinal,entrada,saida){
const ctx=document.getElementById('grafico');

if(window.grafico)window.grafico.destroy();

window.grafico=new Chart(ctx,{
type:'doughnut',
data:{
labels:['Entrada','Saída','Lucro'],
datasets:[{
data:[entrada,saida,saldoFinal]
}]
}
});
}

// CARREGAR
function carregarTudo(){
render("clientes",listaClientes);
render("links",listaLinks);
carregarDashboard();
}

// NAVEGAÇÃO
function mostrar(id){
document.querySelectorAll('.main>div').forEach(d=>d.style.display='none');
document.getElementById(id).style.display='block';
}
</script>

</body>
</html>
