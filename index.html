<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyApCbQJCUQSwP0g6vSBqwrIMSK7n-w9ILc",
  authDomain: "global-tecnologia-kanban.firebaseapp.com",
  projectId: "global-tecnologia-kanban"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔧 ELEMENTOS
const loginDiv = document.getElementById("login");
const appDiv = document.getElementById("app");

const emailInput = document.getElementById("email");
const senhaInput = document.getElementById("senha");

const lista = document.getElementById("lista");
const relogio = document.getElementById("relogio");
const linksDiv = document.getElementById("links");

const valorInput = document.getElementById("valor");
const descricaoInput = document.getElementById("descricao");
const tipoInput = document.getElementById("tipo");
const dataInput = document.getElementById("data");
const capitalInput = document.getElementById("capital");

let userId = null;
let dados = [];
let capital = 0;
let links = [];

// 🔐 LOGIN
window.login = async () => {
  try {
    await signInWithEmailAndPassword(auth, emailInput.value, senhaInput.value);
  } catch (e) {
    alert("Erro ao entrar: " + e.message);
  }
};

window.logout = () => signOut(auth);

// 🔄 AUTENTICAÇÃO
onAuthStateChanged(auth, async (user) => {
  if (user) {
    userId = user.uid;
    loginDiv.style.display = "none";
    appDiv.style.display = "block";
    carregar();
  } else {
    loginDiv.style.display = "block";
    appDiv.style.display = "none";
  }
});

// 📥 CARREGAR DADOS
async function carregar() {
  dados = [];
  const snap = await getDocs(collection(db, userId));
  snap.forEach(d => dados.push({ id: d.id, ...d.data() }));
  atualizar();
}

// 💾 SALVAR LANÇAMENTO
window.salvar = async () => {
  if (!valorInput.value) return alert("Digite um valor");

  await addDoc(collection(db, userId), {
    valor: parseFloat(valorInput.value),
    descricao: descricaoInput.value,
    tipo: tipoInput.value,
    data: dataInput.value
  });

  valorInput.value = "";
  descricaoInput.value = "";

  carregar();
};

// ❌ EXCLUIR
window.excluir = async (id) => {
  await deleteDoc(doc(db, userId, id));
  carregar();
};

// 💰 CAPITAL DE GIRO
window.salvarCapital = () => {
  capital = parseFloat(capitalInput.value) || 0;
  atualizar();
};

// 📊 DASHBOARD
function atualizar() {
  let entradas = dados.filter(d => d.tipo === "entrada").reduce((a,b)=>a+b.valor,0);
  let saidas = dados.filter(d => d.tipo === "saida").reduce((a,b)=>a+b.valor,0);
  let lucro = entradas - saidas;
  let salario = lucro * 0.3;
  let investir = lucro - salario - capital;

  document.getElementById("entradas").innerText = entradas.toFixed(2);
  document.getElementById("saidas").innerText = saidas.toFixed(2);
  document.getElementById("lucro").innerText = lucro.toFixed(2);
  document.getElementById("salario").innerText = salario.toFixed(2);
  document.getElementById("investir").innerText = investir.toFixed(2);
  document.getElementById("capitalView").innerText = capital.toFixed(2);

  lista.innerHTML = "";
  dados.forEach(d => {
    lista.innerHTML += `
      <div style="margin:5px 0">
        ${d.descricao} - R$ ${d.valor}
        <button onclick="excluir('${d.id}')">Excluir</button>
      </div>
    `;
  });
}

// 🔗 LINKS
window.addLink = () => {
  links.push({
    nome: document.getElementById("nomeLink").value,
    url: document.getElementById("urlLink").value
  });
  renderLinks();
};

function renderLinks() {
  linksDiv.innerHTML = "";
  links.forEach((l,i) => {
    linksDiv.innerHTML += `
      <div>
        <a href="${l.url}" target="_blank">${l.nome}</a>
        <button onclick="links.splice(${i},1);renderLinks()">Excluir</button>
      </div>
    `;
  });
}

// ⏰ RELÓGIO
setInterval(() => {
  relogio.innerText = new Date().toLocaleString();
}, 1000);

// 🌙 MODO
window.toggleMode = () => {
  document.body.classList.toggle("light");
};
</script>
