<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Rastreamento PRO</title>

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
<rect width='100' height='100' rx='20' fill='%230f172a'/>
<text x='50%' y='55%' font-size='50' text-anchor='middle' fill='%23facc15'>G</text>
</svg>">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;background:#0f172a;color:#fff;font-family:Arial}
.container{display:flex}
.sidebar{width:250px;background:#111827;padding:20px}
.sidebar button{width:100%;margin:5px 0;padding:10px;border:none;background:#1f2937;color:#fff;border-radius:6px}
.main{flex:1;padding:20px}
.card{background:#1e293b;padding:10px;margin:10px 0;border-radius:10px}
input,select{width:100%;padding:8px;margin:5px 0;background:#0f172a;color:#fff;border:none}
button{cursor:pointer}
.abrir{background:#3b82f6}
.delete{background:#ef4444}
</style>
</head>

<body>

<div id="loginDiv">
<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
<button onclick="registrar()">Criar Conta</button>
</div>

<div id="app" style="display:none;">
<div class="container">

<div class="sidebar">
<button onclick="mostrar('dashboard')">Dashboard</button>
<button onclick="mostrar('clientes')">Clientes</button>
<button onclick="mostrar('rastreadores')">Rastreadores</button>
<button onclick="mostrar('financeiro')">Financeiro</button>
<button onclick="mostrar('estoque')">Estoque</button>
<button onclick="mostrar('links')">Links</button>
<button onclick="mostrar('relatorios')">Relatórios</button>
<button onclick="logout()">Sair</button>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard">
<h2>Dashboard</h2>

<select id="mesSelecionado" onchange="carregarDashboard()">
<option value="0">Janeiro</option>
<option value="1">Fevereiro</option>
<option value="2">Março</option>
<option value="3">Abril</option>
<option value="4">Maio</option>
<option value="5">Junho</option>
<option value="6">Julho</option>
<option value="7">Agosto</option>
<option value="8">Setembro</option>
<option value="9">Outubro</option>
<option value="10">Novembro</option>
<option value="11">Dezembro</option>
</select>

<div id="saldo"></div>
<button onclick="gerarPDF()">📄 Gerar PDF</button>

<canvas id="grafico"></canvas>
</div>

<!-- CLIENTES -->
<div id="clientes" style="display:none">
<h2>Clientes</h2>
<input id="nome" placeholder="Nome">
<input id="telefone" placeholder="Telefone">
<input id="mensalidade" placeholder="Mensalidade">
<input id="vencimento" placeholder="Dia vencimento">
<button onclick="salvarCliente()">Salvar</button>
<div id="listaClientes"></div>
</div>

<!-- RASTREADORES -->
<div id="rastreadores" style="display:none">
<h2>Rastreadores</h2>
<input id="imei" placeholder="IMEI">
<input id="modelo" placeholder="Modelo">
<button onclick="salvarRastreador()">Salvar</button>
<div id="listaRastreadores"></div>
</div>

<!-- FINANCEIRO -->
<div id="financeiro" style="display:none">
<h2>Financeiro</h2>
<input id="valor" placeholder="Valor">
<select id="tipo"><option>Entrada</option><option>Saída</option></select>
<input id="descricao" placeholder="Descrição">
<select id="status"><option>Pago</option><option>Pendente</option></select>
<button onclick="salvarFinanceiro()">Salvar</button>
<div id="listaFinanceiro"></div>
</div>

<!-- ESTOQUE -->
<div id="estoque" style="display:none">
<h2>Estoque</h2>
<input id="produto" placeholder="Produto">
<input id="quantidade" placeholder="Quantidade">
<button onclick="salvarEstoque()">Salvar</button>
<div id="listaEstoque"></div>
</div>

<!-- LINKS -->
<div id="links" style="display:none">
<h2>Links</h2>
<input id="nomeLink" placeholder="Nome">
<input id="urlLink" placeholder="URL">
<button onclick="salvarLink()">Salvar</button>
<div id="listaLinks"></div>
</div>

<!-- RELATÓRIOS -->
<div id="relatorios" style="display:none">
<h2>Relatórios</h2>
<div id="relatorioConteudo"></div>
</div>

</div>
</div>
</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyApCbQJCUQSwP0g6vSBqwrIMSK7n-w9ILc",
authDomain:"global-tecnologia-kanban.firebaseapp.com",
projectId:"global-tecnologia-kanban"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.firestore();
let userId;

function login(){auth.signInWithEmailAndPassword(email.value,senha.value)}
function registrar(){auth.createUserWithEmailAndPassword(email.value,senha.value)}
function logout(){auth.signOut()}

auth.onAuthStateChanged(user=>{
if(user){
userId=user.uid;
loginDiv.style.display="none";
app.style.display="block";
carregarTudo();
}else{
loginDiv.style.display="block";
app.style.display="none";
}
});

function salvar(col,data){db.collection(col).add(data)}

// SALVAR FINANCEIRO CORRETO
function salvarFinanceiro(){
salvar("financeiro",{
userId,
valor:Number(valor.value)||0,
tipo:tipo.value,
descricao:descricao.value,
status:status.value,
data:new Date().toISOString()
});
}

// DASHBOARD PROFISSIONAL
function carregarDashboard(){

let entrada=0,saida=0;
let mes=Number(mesSelecionado.value);
let ano=new Date().getFullYear();

db.collection("financeiro").where("userId","==",userId).get()
.then(snap=>{

snap.forEach(doc=>{
let f=doc.data();
if(!f.data) return;

let d=new Date(f.data);

if(d.getMonth()==mes && d.getFullYear()==ano){

if(f.status==="Pago"){
if(f.tipo==="Entrada")entrada+=f.valor;
if(f.tipo==="Saída")saida+=f.valor;
}

}

});

let saldoFinal=entrada-saida;
let salario=saldoFinal*0.6;
let reinvestimento=saldoFinal*0.4;

saldo.innerHTML=`
💰 Entrada: R$ ${entrada.toFixed(2)}<br>
💸 Saída: R$ ${saida.toFixed(2)}<br>
📊 Saldo: R$ ${saldoFinal.toFixed(2)}<br><br>
💼 Salário: R$ ${salario.toFixed(2)}<br>
🔁 Reinvestimento: R$ ${reinvestimento.toFixed(2)}
`;

graficoComparativo();

});
}

// GRÁFICO ANUAL
function graficoComparativo(){

let meses=Array(12).fill(0);

db.collection("financeiro").where("userId","==",userId).get()
.then(snap=>{

snap.forEach(doc=>{
let f=doc.data();
if(!f.data) return;

let d=new Date(f.data);

if(f.tipo==="Entrada" && f.status==="Pago"){
meses[d.getMonth()]+=f.valor;
}
});

const ctx=document.getElementById('grafico');
if(window.grafico)window.grafico.destroy();

window.grafico=new Chart(ctx,{
type:'line',
data:{
labels:['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'],
datasets:[{label:'Receita',data:meses}]
}
});

});
}

// PDF
async function gerarPDF(){
const { jsPDF } = window.jspdf;
const doc = new jsPDF();

let y=10;
doc.text("Relatório Financeiro",10,y);

let mes=Number(mesSelecionado.value);
let ano=new Date().getFullYear();

await db.collection("financeiro").where("userId","==",userId).get()
.then(snap=>{
snap.forEach(d=>{
let f=d.data();
if(!f.data) return;

let data=new Date(f.data);

if(data.getMonth()==mes && data.getFullYear()==ano){
y+=10;
doc.text(`${f.tipo} - R$ ${f.valor} - ${f.descricao||""}`,10,y);
}
});
});

doc.save("relatorio.pdf");
}

// LINKS BOTÃO ABRIR
function render(col,lista){
db.collection(col).where("userId","==",userId).onSnapshot(snap=>{
lista.innerHTML="";
snap.forEach(doc=>{
let d=doc.data();

let valores=Object.entries(d).filter(([k])=>k!="userId").map(([k,v])=>v).join(" | ");

let btn="";
if(col==="links"){
let url=d.url.startsWith('http')?d.url:'https://'+d.url;
btn+=`<button class="abrir" onclick="window.open('${url}')">Abrir</button>`;
}

lista.innerHTML+=`
<div class="card">
${valores}<br>
${btn}
<button class="delete" onclick="del('${col}','${doc.id}')">Excluir</button>
</div>`;
});
});
}

function del(col,id){db.collection(col).doc(id).delete()}

function carregarTudo(){
render("clientes",listaClientes);
render("rastreadores",listaRastreadores);
render("financeiro",listaFinanceiro);
render("estoque",listaEstoque);
render("links",listaLinks);
carregarDashboard();
}

function mostrar(id){
document.querySelectorAll('.main>div').forEach(d=>d.style.display='none');
document.getElementById(id).style.display='block';
}
</script>

</body>
</html>
