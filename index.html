<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financeiro PRO Nível 4</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#fff}
.container{display:flex}
.sidebar{width:230px;background:#111827;padding:20px}
.sidebar button{width:100%;margin:5px 0;padding:10px;background:#1f2937;color:#fff;border:none;border-radius:6px;cursor:pointer}
.main{flex:1;padding:20px}

.card{background:#1e293b;padding:15px;margin:10px 0;border-radius:12px}
input,select{width:100%;padding:8px;margin:5px 0;background:#020617;color:#fff;border:none;border-radius:6px}

.btn{padding:6px;border:none;border-radius:6px;margin-top:5px;cursor:pointer}
.editar{background:#3b82f6;color:#fff}
.excluir{background:#ef4444;color:#fff}

.alerta{color:#f87171;font-weight:bold}
.ok{color:#4ade80}

</style>
</head>

<body>

<div id="loginDiv">
<h2>Login</h2>
<input id="email">
<input id="senha" type="password">
<button onclick="login()">Entrar</button>
</div>

<div id="app" style="display:none;">
<div class="container">

<div class="sidebar">
<button onclick="mostrar('dashboard')">Dashboard</button>
<button onclick="mostrar('financeiro')">Financeiro</button>
<button onclick="mostrar('contas')">Contas</button>
<button onclick="logout()">Sair</button>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard">
<h2>Dashboard</h2>

<select id="mesFiltro" onchange="carregarDashboard()"></select>

<div id="resumo"></div>

<canvas id="grafico"></canvas>
</div>

<!-- FINANCEIRO -->
<div id="financeiro" style="display:none">
<h2>Lançamentos</h2>

<input id="valor" placeholder="Valor">
<select id="tipo">
<option>Entrada</option>
<option>Saída</option>
</select>

<input id="descricao" placeholder="Descrição">

<select id="status">
<option>Pago</option>
<option>Pendente</option>
</select>

<button id="btnSalvar" onclick="salvarFinanceiro()">Salvar</button>

<hr>

<input id="busca" placeholder="Buscar..." onkeyup="renderFinanceiro()">

<div id="listaFinanceiro"></div>
</div>

<!-- CONTAS -->
<div id="contas" style="display:none">
<h2>Contas</h2>

<input id="nomeConta" placeholder="Nome">
<input id="valorConta" placeholder="Valor">
<input type="date" id="dataConta">

<button onclick="salvarConta()">Salvar</button>

<div id="listaContas"></div>
</div>

</div>
</div>
</div>

<script>

// FIREBASE
const firebaseConfig={
apiKey:"AIzaSyApCbQJCUQSwP0g6vSBqwrIMSK7n-w9ILc",
authDomain:"global-tecnologia-kanban.firebaseapp.com",
projectId:"global-tecnologia-kanban"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.firestore();

let userId, editId=null;

// LOGIN
function login(){auth.signInWithEmailAndPassword(email.value,senha.value)}
function logout(){auth.signOut()}

auth.onAuthStateChanged(user=>{
if(user){
userId=user.uid;
loginDiv.style.display="none";
app.style.display="block";
init();
}else{
loginDiv.style.display="block";
app.style.display="none";
}
});

// INIT
function init(){

mesFiltro.innerHTML="";
for(let i=0;i<12;i++){
mesFiltro.innerHTML+=`<option value="${i}">${i+1}</option>`;
}

mesFiltro.value=new Date().getMonth();

renderFinanceiro();
carregarDashboard();
renderContas();
}

// SALVAR
function salvarFinanceiro(){

let v=parseFloat(valor.value);

if(isNaN(v)){alert("Valor inválido");return;}

let sal=0,inv=0;

if(tipo.value==="Entrada"){
sal=v*0.6;
inv=v*0.4;
}

let dados={
userId,
valor:v,
tipo:tipo.value,
descricao:descricao.value,
status:status.value,
salario:sal,
investimento:inv,
data:new Date().toISOString()
};

if(editId){
db.collection("financeiro").doc(editId).update(dados);
editId=null;
btnSalvar.innerText="Salvar";
}else{
db.collection("financeiro").add(dados);
}

valor.value="";
descricao.value="";
}

// EDITAR
function editar(id,f){
valor.value=f.valor;
tipo.value=f.tipo;
descricao.value=f.descricao;
status.value=f.status;

editId=id;
btnSalvar.innerText="Atualizar";
}

// EXCLUIR
function excluir(id){
if(confirm("Excluir?")){
db.collection("financeiro").doc(id).delete();
}
}

// LISTA
function renderFinanceiro(){

db.collection("financeiro")
.where("userId","==",userId)
.orderBy("data","desc")
.onSnapshot(snap=>{

listaFinanceiro.innerHTML="";
let buscaTxt=busca.value.toLowerCase();

snap.forEach(doc=>{
let f=doc.data();

if(f.descricao && !f.descricao.toLowerCase().includes(buscaTxt)) return;

listaFinanceiro.innerHTML+=`
<div class="card">
<strong>${f.tipo}</strong> - R$ ${f.valor}<br>
📝 ${f.descricao || "-"}<br>

${f.tipo==="Entrada" ? `
💼 Salário: ${f.salario.toFixed(2)}<br>
🔁 Investimento: ${f.investimento.toFixed(2)}
` : ""}

<button class="btn editar" onclick="editar('${doc.id}',${JSON.stringify(f)})">Editar</button>
<button class="btn excluir" onclick="excluir('${doc.id}')">Excluir</button>
</div>
`;
});

});
}

// DASHBOARD
function carregarDashboard(){

let entrada=0,saida=0;

let mes=Number(mesFiltro.value);

db.collection("financeiro")
.where("userId","==",userId)
.get()
.then(snap=>{

snap.forEach(doc=>{
let f=doc.data();
let d=new Date(f.data);

if(d.getMonth()==mes){

if(f.tipo==="Entrada") entrada+=f.valor;
if(f.tipo==="Saída") saida+=f.valor;

}
});

let lucro=entrada-saida;

resumo.innerHTML=`
💰 Entrada: ${entrada.toFixed(2)}<br>
💸 Saída: ${saida.toFixed(2)}<br>
📊 Lucro: <span class="${lucro>=0?'ok':'alerta'}">${lucro.toFixed(2)}</span>
`;

grafico(entrada,saida);

});
}

// GRÁFICO
function grafico(e,s){

if(window.g) window.g.destroy();

g=new Chart(grafico,{
type:'doughnut',
data:{
labels:["Entrada","Saída"],
datasets:[{data:[e,s]}]
}
});
}

// CONTAS
function salvarConta(){
db.collection("contas").add({
userId,
nome:nomeConta.value,
valor:parseFloat(valorConta.value),
data:dataConta.value
});
}

function renderContas(){

db.collection("contas")
.where("userId","==",userId)
.onSnapshot(snap=>{

listaContas.innerHTML="";

snap.forEach(doc=>{
let c=doc.data();

let hoje=new Date();
let venc=new Date(c.data);

let atraso = venc < hoje;

listaContas.innerHTML+=`
<div class="card">
${c.nome} - R$ ${c.valor}<br>
${c.data} 
<span class="${atraso?'alerta':'ok'}">
${atraso?'Atrasado':'Em dia'}
</span>
</div>
`;
});

});
}

// NAV
function mostrar(id){
document.querySelectorAll(".main>div").forEach(d=>d.style.display="none");
document.getElementById(id).style.display="block";
}

</script>

</body>
</html>
