<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Global Tecnologia</title>

<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/684/684908.png">

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

.light {
  background:#f1f5f9;
  color:black;
}

.container {
  padding:20px;
  max-width:1200px;
  margin:auto;
}

.card {
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin:10px 0;
  box-shadow:0 0 10px rgba(0,0,0,0.5);
}

input, select {
  padding:10px;
  margin:5px;
  border-radius:6px;
  border:none;
}

button {
  background:linear-gradient(45deg, orange, #ff6600);
  border:none;
  padding:10px;
  border-radius:6px;
  cursor:pointer;
  color:white;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:10px;
}

.top {
  display:flex;
  justify-content:space-between;
  align-items:center;
}
</style>
</head>

<body>

<div id="login" class="container">
  <div class="card">
    <h2>Global Tecnologia</h2>
    <input id="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
  </div>
</div>

<div id="app" class="container" style="display:none;">

<div class="top">
  <h2>Dashboard</h2>
  <div>
    <button onclick="toggleMode()">Modo</button>
    <button onclick="logout()">Sair</button>
  </div>
</div>

<div id="relogio"></div>

<div class="grid">
  <div class="card">Entradas: <span id="entradas"></span></div>
  <div class="card">Saídas: <span id="saidas"></span></div>
  <div class="card">Lucro: <span id="lucro"></span></div>
  <div class="card">Salário (30%): <span id="salario"></span></div>
  <div class="card">Capital: <span id="capitalView"></span></div>
  <div class="card">Investir: <span id="investir"></span></div>
</div>

<div class="card">
  <input id="valor" type="number" placeholder="Valor">
  <input id="descricao" placeholder="Descrição">
  <input id="data" type="date">
  <select id="tipo">
    <option value="entrada">Entrada</option>
    <option value="saida">Saída</option>
  </select>
  <select id="categoria">
    <option value="salario">Salário</option>
    <option value="material">Material</option>
    <option value="outros">Outros</option>
  </select>
  <button onclick="salvar()">Salvar</button>
</div>

<div class="card">
  <h3>Capital de Giro</h3>
  <input id="capital" type="number" onchange="salvarCapital()">
</div>

<div class="card">
  <h3>Links Rápidos</h3>
  <input id="nomeLink" placeholder="Nome">
  <input id="urlLink" placeholder="URL">
  <button onclick="addLink()">Adicionar</button>
  <div id="links"></div>
</div>

<div class="card">
  <h3>Histórico</h3>
  <div id="lista"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyApCbQJCUQSwP0g6vSBqwrIMSK7n-w9ILc",
  authDomain: "global-tecnologia-kanban.firebaseapp.com",
  projectId: "global-tecnologia-kanban",
  storageBucket: "global-tecnologia-kanban.firebasestorage.app",
  messagingSenderId: "526527534352",
  appId: "1:526527534352:web:22b874f8029b3cd4c48195",
  measurementId: "G-MX3QFXSL04"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const loginDiv = document.getElementById("login");
const appDiv = document.getElementById("app");

let userId = null;
let dados = [];
let capital = 0;
const links = document.getElementById("links");
const nomeLink = document.getElementById("nomeLink");
const urlLink = document.getElementById("urlLink");

window.login = async () => {
  await signInWithEmailAndPassword(auth, email.value, senha.value);
};

window.logout = () => signOut(auth);

onAuthStateChanged(auth, async (user) => {
  if (user) {
    userId = user.uid;
    loginDiv.style.display="none";
    appDiv.style.display="block";
    carregar();
    carregarLinks(); // 👈 MUITO IMPORTANTE
  }
});
async function carregar(){
  dados=[];
  const snap = await getDocs(collection(db, userId));
  snap.forEach(d=>dados.push({id:d.id,...d.data()}));
  atualizar();
}

window.salvar = async () => {
  await addDoc(collection(db, userId), {
    valor: parseFloat(valor.value) || 0,
    descricao: descricao.value,
    tipo: tipo.value,
    categoria: categoria.value,
    data: data.value
  });
  carregar();
};
// ===== LINKS FIREBASE =====

window.addLink = async () => {
  if(!nomeLink.value || !urlLink.value){
    alert("Preencha nome e URL!");
    return;
  }

  await addDoc(collection(db, userId, "links"), {
    nome: nomeLink.value,
    url: urlLink.value
  });

  nomeLink.value = "";
  urlLink.value = "";

  carregarLinks();
};

window.removerLink = async (id) => {
  await deleteDoc(doc(db, userId, "links", id));
  carregarLinks();
};

async function carregarLinks(){
  links.innerHTML = "";

  const snap = await getDocs(collection(db, userId, "links"));

  snap.forEach(docItem => {
    const l = docItem.data();

    links.innerHTML += `
      <div>
        <a class="link-rapido" href="${l.url}" target="_blank">${l.nome}</a>
        <button onclick="removerLink('${docItem.id}')">Excluir</button>
      </div>
    `;
  });
}
  window.excluir = async (id)=>{
  await deleteDoc(doc(db, userId, id));
  carregar();
};
window.editar = async (id)=>{
  let novo = prompt("Novo valor:");
  await updateDoc(doc(db,userId,id),{valor:parseFloat(novo)});
  carregar();
};

window.salvarCapital = ()=>{
  capital=parseFloat(document.getElementById("capital").value)||0;
  atualizar();
};

const entradasEl = document.getElementById("entradas");
const saidasEl = document.getElementById("saidas");
const lucroEl = document.getElementById("lucro");
const salarioEl = document.getElementById("salario");
const investirEl = document.getElementById("investir");
const capitalView = document.getElementById("capitalView");
const lista = document.getElementById("lista");
const relogio = document.getElementById("relogio");
  
function atualizar(){
  let entradas = dados.filter(d=>d.tipo=="entrada").reduce((a,b)=>a+b.valor,0);
  let saidas = dados.filter(d=>d.tipo=="saida").reduce((a,b)=>a+b.valor,0);
  let lucro = entradas - saidas;
  let salario = lucro*0.3;
  let investir = lucro - salario - capital;

  entradasEl.innerText=entradas.toFixed(2);
  saidasEl.innerText=saidas.toFixed(2);
  lucroEl.innerText=lucro.toFixed(2);
  salarioEl.innerText=salario.toFixed(2);
  investirEl.innerText=investir.toFixed(2);
  capitalView.innerText=capital.toFixed(2);

  lista.innerHTML="";
  dados.forEach(d=>{
    lista.innerHTML+=`
    <div>
      ${d.descricao} - R$ ${d.valor}
      <button onclick="editar('${d.id}')">Editar</button>
      <button onclick="excluir('${d.id}')">Excluir</button>
    </div>`;
  });
}

window.toggleMode = ()=>{
  document.body.classList.toggle("light");
};

setInterval(()=>{
  relogio.innerText=new Date().toLocaleString();
},1000);
renderLinks();
</script>

</body>
</html>
